windows_downloads_dir: {{windows_downloads_dir}}
database_file_path: "{{database_file_path}}"
artifact_dir: data
output_dir: /mnt/e/_/active/projects/little-busters/media
shows: {}
job:
  name: example_job
  pipelines:
    4k_240fps:
      metadata: {}
      input:
        link: {{pipelines["4k_240fps"].input.link}}
      steps:
        - type: ffmpeg
          operations:
            - type: trim
              start: 00:00:02
              end: 00:00:04
        - type: upscale
          width: 2160
        - type: interpolate
          fps: 240
